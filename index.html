<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SafeOps | Segurança Industrial SaaS</title>
    <!-- Tailwind CSS + Font Awesome + QR Code Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        body {
            background: #0a0f1a;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f2e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b4a6b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5c7ab3;
        }
        .slide-enter {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .toast-notification {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .card-glass {
            background: linear-gradient(135deg, rgba(30, 35, 48, 0.95) 0%, rgba(20, 25, 38, 0.98) 100%);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(59, 74, 107, 0.5);
        }
        .risk-badge {
            transition: all 0.15s ease;
        }
        .qr-container img {
            margin: 0 auto;
            width: 90px;
            height: auto;
            background: white;
            padding: 6px;
            border-radius: 12px;
        }
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 768px) {
            .sidebar-mobile {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }
            .sidebar-mobile.open {
                transform: translateX(0);
            }
        }
        button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid #60a5fa;
            outline-offset: 2px;
        }
        /* Estilo para preview da selfie */
        .selfie-preview {
            transition: all 0.2s ease;
        }
        .camera-box {
            background: linear-gradient(135deg, #0f1422 0%, #0a0f1a 100%);
        }
    </style>
</head>
<body class="bg-[#0a0f1a] font-sans antialiased">

    <div id="mobileOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 hidden md:hidden"></div>

    <div class="flex min-h-screen">
        <!-- MENU LATERAL -->
        <aside id="sidebar" class="sidebar-transition fixed md:relative w-72 h-full bg-[#0d1222] border-r border-[#1e2a3e] shadow-2xl flex flex-col z-50 sidebar-mobile">
            <div class="p-6 border-b border-[#1e2a3e]">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-red-600 to-red-800 p-2.5 rounded-xl shadow-lg">
                        <i class="fas fa-hard-hat text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white tracking-tight">SafeOps<span class="text-red-500">|</span></h1>
                        <p class="text-xs text-gray-400">Segurança Industrial SaaS</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 py-6 px-4 space-y-2">
                <button id="navAdmin" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                    <i class="fas fa-tachometer-alt w-5 text-indigo-400"></i>
                    <span class="font-medium">Dashboard Admin</span>
                </button>
                <button id="navMachines" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                    <i class="fas fa-microchip w-5 text-blue-400"></i>
                    <span class="font-medium">Máquinas & EPIs</span>
                </button>
                <button id="navEmployees" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                    <i class="fas fa-users w-5 text-emerald-400"></i>
                    <span class="font-medium">Colaboradores</span>
                </button>
                <div class="h-px bg-[#1e2a3e] my-3"></div>
                <button id="navQRSImulator" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                    <i class="fas fa-qrcode w-5 text-purple-400"></i>
                    <span class="font-medium">Simular QR Code</span>
                </button>
            </nav>
            <div class="p-4 border-t border-[#1e2a3e] text-xs text-gray-500">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-shield-alt text-emerald-500"></i>
                    <span>ISO 45001:2023</span>
                </div>
                <p class="text-[11px]">v3.0 • Selfie comprobatória</p>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="flex-1 min-h-screen">
            <div class="sticky top-0 z-30 bg-[#0d1222]/90 backdrop-blur-md border-b border-[#1e2a3e] px-4 py-3 flex items-center justify-between">
                <button id="menuToggle" class="md:hidden text-gray-300 hover:text-white text-2xl p-2 rounded-lg hover:bg-[#1a2035]">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-3 ml-auto">
                    <div class="hidden sm:flex items-center gap-2 bg-[#111827] px-3 py-1.5 rounded-full border border-[#1e2a3e]">
                        <i class="fas fa-circle text-emerald-500 text-xs"></i>
                        <span class="text-xs text-gray-300">Sistema operacional</span>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center shadow-lg">
                        <i class="fas fa-user-shield text-white text-sm"></i>
                    </div>
                </div>
            </div>
            <div id="dynamicPanel" class="p-5 md:p-7 lg:p-8 slide-enter">
                <div class="flex items-center justify-center py-20">
                    <i class="fas fa-spinner fa-pulse text-4xl text-indigo-400 mb-4"></i>
                    <p class="text-gray-400">Carregando SafeOps...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script>
        // ================================
        // 1. DADOS E CONFIGURAÇÕES
        // ================================
        const RISKS_CATALOG = [
            "Atropelamento", "Choque elétrico", "Corte/Amputação", "Queda de altura", 
            "Ruído excessivo", "Exposição química", "Incêndio", "Explosão", "Fadiga térmica",
            "Esforço repetitivo", "Poeira industrial", "Vibração"
        ];
        
        const EPIS_CATALOG = [
            "Capacete de segurança", "Óculos de proteção", "Protetor auricular", 
            "Luvas de borracha", "Cinto de segurança", "Máscara respiratória", 
            "Avental impermeável", "Calçado de segurança", "Jaleco", "Protetor facial",
            "Luvas térmicas", "Trava-quedas"
        ];

        let machines = [
            { id: "MACH-001", name: "Prensa Hidráulica 3000", risks: ["Corte/Amputação", "Ruído excessivo"], requiredEpis: ["Luvas de borracha", "Protetor auricular", "Calçado de segurança"] },
            { id: "MACH-002", name: "Esteira Transportadora", risks: ["Atropelamento", "Choque elétrico"], requiredEpis: ["Capacete de segurança", "Calçado de segurança"] },
            { id: "MACH-003", name: "Painel Elétrico Industrial", risks: ["Choque elétrico", "Incêndio"], requiredEpis: ["Luvas de borracha", "Óculos de proteção", "Capacete de segurança"] }
        ];
        
        let employees = [
            { id: "FUNC-001", name: "Carlos Mendes", role: "Operador", shift: "Matutino", sector: "Produção" },
            { id: "FUNC-002", name: "Juliana Rocha", role: "Manutenção", shift: "Noturno", sector: "Manutenção" }
        ];

        // Histórico de checklists com selfies (simulação)
        let checklistHistory = [];

        function saveData() {
            localStorage.setItem("safeops_machines", JSON.stringify(machines));
            localStorage.setItem("safeops_employees", JSON.stringify(employees));
            localStorage.setItem("safeops_checklist_history", JSON.stringify(checklistHistory));
        }
        
        function loadData() {
            const storedMachines = localStorage.getItem("safeops_machines");
            const storedEmployees = localStorage.getItem("safeops_employees");
            const storedHistory = localStorage.getItem("safeops_checklist_history");
            if(storedMachines) machines = JSON.parse(storedMachines);
            if(storedEmployees) employees = JSON.parse(storedEmployees);
            if(storedHistory) checklistHistory = JSON.parse(storedHistory);
        }
        loadData();
        
        function generateQRCodeUrl(machineId) {
            const baseUrl = window.location.origin + window.location.pathname;
            return `${baseUrl}?checklist=${encodeURIComponent(machineId)}`;
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-notification px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-medium backdrop-blur-sm border ${
                type === 'success' ? 'bg-emerald-900/90 border-emerald-500 text-emerald-200' : 
                type === 'error' ? 'bg-red-900/90 border-red-500 text-red-200' : 
                'bg-blue-900/90 border-blue-500 text-blue-200'
            }`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon} text-lg"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            if(menuToggle) {
                menuToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('open');
                    overlay.classList.toggle('hidden');
                });
                overlay.addEventListener('click', () => {
                    sidebar.classList.remove('open');
                    overlay.classList.add('hidden');
                });
            }
        }
        
        // ================================
        // 2. MÓDULO ADMIN COMPLETO
        // ================================
        function renderFullAdmin() {
            const html = `
                <div class="grid lg:grid-cols-2 gap-7">
                    <div class="space-y-5">
                        <div class="flex items-center gap-3 border-b border-[#1e2a3e] pb-3">
                            <div class="bg-blue-600/20 p-2 rounded-xl"><i class="fas fa-microchip text-blue-400 text-xl"></i></div>
                            <h2 class="text-xl font-bold text-white">Máquinas & EPIs</h2>
                        </div>
                        <div class="card-glass rounded-2xl p-5 shadow-xl">
                            <h3 class="font-bold text-gray-200 flex items-center gap-2 mb-4"><i class="fas fa-plus-circle text-emerald-400"></i> Nova Máquina</h3>
                            <div class="space-y-4">
                                <input type="text" id="machineName" placeholder="Nome da máquina" class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white placeholder-gray-500 focus:border-blue-500">
                                <div>
                                    <label class="block text-sm font-medium text-gray-300 mb-2">Riscos (multiselect)</label>
                                    <select id="machineRisks" multiple class="w-full p-2 border border-[#1f2a3e] rounded-xl bg-[#111827] text-gray-200 h-28">
                                        ${RISKS_CATALOG.map(risk => `<option value="${risk}">${risk}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-300 mb-2">EPIs obrigatórios</label>
                                    <select id="machineEpis" multiple class="w-full p-2 border border-[#1f2a3e] rounded-xl bg-[#111827] text-gray-200 h-28">
                                        ${EPIS_CATALOG.map(epi => `<option value="${epi}">${epi}</option>`).join('')}
                                    </select>
                                </div>
                                <button id="addMachineBtn" class="bg-blue-600 hover:bg-blue-500 text-white w-full py-2.5 rounded-xl font-bold transition"><i class="fas fa-save mr-2"></i> Registrar Máquina</button>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <h3 class="font-bold text-gray-300 flex items-center gap-2"><i class="fas fa-cogs text-indigo-400"></i> Máquinas Ativas (${machines.length})</h3>
                            <div id="machineListContainer" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
                                ${renderMachinesListDark()}
                            </div>
                        </div>
                    </div>
                    <div class="space-y-5">
                        <div class="flex items-center gap-3 border-b border-[#1e2a3e] pb-3">
                            <div class="bg-emerald-600/20 p-2 rounded-xl"><i class="fas fa-users text-emerald-400 text-xl"></i></div>
                            <h2 class="text-xl font-bold text-white">Colaboradores</h2>
                        </div>
                        <div class="card-glass rounded-2xl p-5 shadow-xl">
                            <h3 class="font-bold text-gray-200 flex items-center gap-2 mb-4"><i class="fas fa-user-plus text-emerald-400"></i> Adicionar Funcionário</h3>
                            <div class="space-y-4">
                                <input type="text" id="empName" placeholder="Nome completo" class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white">
                                <input type="text" id="empRole" placeholder="Cargo" class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white">
                                <select id="empShift" class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white">
                                    <option value="Matutino">Matutino (06-14h)</option>
                                    <option value="Vespertino">Vespertino (14-22h)</option>
                                    <option value="Noturno">Noturno (22-06h)</option>
                                </select>
                                <button id="addEmployeeBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white w-full py-2.5 rounded-xl font-bold transition"><i class="fas fa-user-check mr-2"></i> Cadastrar</button>
                            </div>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-300 mb-3"><i class="fas fa-id-card mr-2"></i> Lista de Funcionários</h3>
                            <div id="employeeListContainer" class="space-y-2 max-h-[460px] overflow-y-auto">
                                ${renderEmployeesListDark()}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById("dynamicPanel").innerHTML = html;
            attachDarkAdminEvents();
        }
        
        function renderMachinesListDark() {
            if(machines.length === 0) return '<div class="text-gray-500 text-center p-6 bg-[#111827] rounded-xl">Nenhuma máquina registrada</div>';
            return machines.map(machine => `
                <div class="card-glass rounded-xl p-4 transition-all hover:border-blue-500/50">
                    <div class="flex flex-col md:flex-row justify-between gap-3">
                        <div class="flex-1">
                            <div class="flex flex-wrap items-center gap-2 mb-2">
                                <span class="font-bold text-white text-lg">${escapeHtml(machine.name)}</span>
                                <span class="text-xs bg-[#1f2a3e] px-2 py-0.5 rounded-full text-gray-300 font-mono">${machine.id}</span>
                            </div>
                            <div class="flex flex-wrap gap-1 mb-2">
                                ${machine.risks.map(r => `<span class="risk-badge bg-red-900/40 text-red-300 text-xs px-2 py-1 rounded-full border border-red-800/50"><i class="fas fa-skull-crosswalk text-[10px] mr-1"></i>${r}</span>`).join('')}
                            </div>
                            <div class="text-xs text-gray-400"><i class="fas fa-helmet-safety text-emerald-400 mr-1"></i> EPIs: ${machine.requiredEpis.join(', ')}</div>
                        </div>
                        <div class="flex flex-col items-center gap-2 min-w-[100px]">
                            <div id="qr-${machine.id}" class="qr-container bg-gray-900 p-2 rounded-xl"></div>
                            <button class="deleteMachineBtn text-red-400 hover:text-red-300 text-sm font-medium transition" data-id="${machine.id}"><i class="fas fa-trash-alt"></i> Remover</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderEmployeesListDark() {
            if(employees.length === 0) return '<div class="text-gray-500 text-center p-6 bg-[#111827] rounded-xl">Nenhum colaborador</div>';
            return employees.map(emp => `
                <div class="bg-[#111827] border border-[#1f2a3e] rounded-xl p-3 flex justify-between items-center hover:bg-[#161e2e] transition">
                    <div>
                        <p class="font-semibold text-white">${escapeHtml(emp.name)}</p>
                        <p class="text-xs text-gray-400">${emp.role} • ${emp.shift} • ID: ${emp.id}</p>
                    </div>
                    <button class="deleteEmployeeBtn text-red-400 hover:text-red-300 transition text-lg" data-id="${emp.id}"><i class="fas fa-user-slash"></i></button>
                </div>
            `).join('');
        }
        
        function attachDarkAdminEvents() {
            attachQRCodesDark();
            document.getElementById("addMachineBtn")?.addEventListener("click", () => {
                const name = document.getElementById("machineName").value.trim();
                const risks = Array.from(document.getElementById("machineRisks").selectedOptions).map(o => o.value);
                const epis = Array.from(document.getElementById("machineEpis").selectedOptions).map(o => o.value);
                if(!name) return showToast("Informe o nome da máquina", "error");
                if(risks.length === 0) return showToast("Selecione riscos", "error");
                if(epis.length === 0) return showToast("Selecione EPIs", "error");
                const newId = `MACH-${String(machines.length+1).padStart(3,'0')}`;
                machines.push({ id: newId, name, risks, requiredEpis: epis });
                saveData();
                renderFullAdmin();
                showToast(`Máquina ${name} criada com sucesso!`, "success");
            });
            document.querySelectorAll(".deleteMachineBtn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = btn.dataset.id;
                    machines = machines.filter(m => m.id !== id);
                    saveData();
                    renderFullAdmin();
                    showToast("Máquina removida", "success");
                });
            });
            document.getElementById("addEmployeeBtn")?.addEventListener("click", () => {
                const name = document.getElementById("empName").value.trim();
                const role = document.getElementById("empRole").value.trim();
                const shift = document.getElementById("empShift").value;
                if(!name || !role) return showToast("Preencha nome e cargo", "error");
                const newId = `FUNC-${String(employees.length + 100).slice(-3)}`;
                employees.push({ id: newId, name, role, shift, sector: "Operações" });
                saveData();
                renderFullAdmin();
                showToast(`Funcionário ${name} cadastrado`, "success");
            });
            document.querySelectorAll(".deleteEmployeeBtn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = btn.dataset.id;
                    employees = employees.filter(e => e.id !== id);
                    saveData();
                    renderFullAdmin();
                    showToast("Colaborador removido", "success");
                });
            });
        }
        
        function attachQRCodesDark() {
            machines.forEach(machine => {
                const container = document.getElementById(`qr-${machine.id}`);
                if(container && !container.hasChildNodes()) {
                    new QRCode(container, {
                        text: generateQRCodeUrl(machine.id),
                        width: 80,
                        height: 80,
                        colorDark: "#1e1e2f",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
            });
        }
        
        // ================================
        // 3. CHECKLIST COM SELFIE (DROPDOWN + FOTO)
        // ================================
        let currentSelfieDataUrl = null;
        
        function renderChecklistModule(machineId) {
            const machine = machines.find(m => m.id === machineId);
            if(!machine) {
                document.getElementById("dynamicPanel").innerHTML = `<div class="card-glass rounded-2xl p-8 text-center"><i class="fas fa-frown text-5xl text-red-400 mb-3"></i><h2 class="text-xl text-white">Máquina não localizada</h2><button id="backHome" class="mt-4 bg-indigo-600 px-5 py-2 rounded-xl">Voltar</button></div>`;
                document.getElementById("backHome")?.addEventListener("click", () => renderFullAdmin());
                return;
            }
            
            currentSelfieDataUrl = null;
            
            const epiItems = machine.requiredEpis.map(epi => `
                <label class="flex items-center gap-3 p-3 bg-[#111827] rounded-xl cursor-pointer hover:bg-[#1a2035] transition border border-[#1f2a3e]">
                    <input type="checkbox" data-epi="${epi}" class="check-epi w-5 h-5 text-green-500 rounded focus:ring-green-400">
                    <span class="text-gray-200">${escapeHtml(epi)}</span>
                </label>
            `).join('');
            
            const html = `
                <div class="max-w-3xl mx-auto">
                    <div class="card-glass rounded-2xl p-6 shadow-2xl">
                        <div class="flex items-center gap-3 mb-6 border-b border-[#1e2a3e] pb-4">
                            <i class="fas fa-qrcode text-3xl text-purple-400"></i>
                            <div><h2 class="text-2xl font-bold text-white">Checklist de Segurança</h2><p class="text-gray-400 text-sm">Validação de EPIs + Selfie comprobatória</p></div>
                        </div>
                        <div class="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-5 rounded-xl mb-6">
                            <p class="text-sm text-gray-300">Máquina: <span class="font-bold text-white">${escapeHtml(machine.name)}</span> (${machine.id})</p>
                            <div class="flex flex-wrap gap-2 mt-3"><span class="text-xs text-gray-300">Riscos:</span>${machine.risks.map(r => `<span class="bg-red-900/60 text-red-200 px-2 py-0.5 rounded-full text-xs">${r}</span>`).join('')}</div>
                        </div>
                        <div class="space-y-2" id="epiChecklistContainer">${epiItems}</div>
                        <div id="statusMessage" class="mt-6 p-4 rounded-xl text-center font-bold text-lg bg-gray-800/50 text-gray-300">⏳ Aguardando confirmação dos EPIs</div>
                        
                        <!-- DROPDOWN DE SELFIE (inicialmente escondido) -->
                        <div id="selfieSection" class="mt-6 hidden transition-all duration-300">
                            <div class="border-t border-[#1e2a3e] pt-4">
                                <h3 class="font-bold text-white flex items-center gap-2 mb-3"><i class="fas fa-camera text-purple-400"></i> Comprovação com Selfie</h3>
                                <p class="text-xs text-gray-400 mb-3">Tire uma foto mostrando o uso correto dos EPIs</p>
                                
                                <!-- Opções de captura: arquivo ou câmera -->
                                <div class="space-y-3">
                                    <input type="file" id="selfieInput" accept="image/*" capture="environment" class="w-full p-2 bg-[#111827] border border-[#1f2a3e] rounded-xl text-gray-300 text-sm">
                                    <button id="openCameraBtn" class="w-full bg-purple-600/30 hover:bg-purple-600/50 text-purple-300 py-2 rounded-xl transition flex items-center justify-center gap-2 border border-purple-500/30">
                                        <i class="fas fa-camera-retro"></i> Abrir câmera (dispositivo móvel)
                                    </button>
                                </div>
                                
                                <!-- Preview da selfie -->
                                <div id="selfiePreview" class="mt-4 hidden">
                                    <div class="relative rounded-xl overflow-hidden border-2 border-emerald-500/50 selfie-preview">
                                        <img id="selfieImg" class="w-full max-h-64 object-cover" alt="Selfie comprobatória">
                                        <button id="removeSelfieBtn" class="absolute top-2 right-2 bg-red-600/80 hover:bg-red-600 text-white p-1.5 rounded-full text-xs">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <p class="text-emerald-400 text-xs text-center mt-2"><i class="fas fa-check-circle"></i> Selfie capturada com sucesso!</p>
                                </div>
                                
                                <button id="confirmSelfieBtn" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 rounded-xl font-bold transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                    <i class="fas fa-check-double mr-2"></i> Finalizar Checklist com Selfie
                                </button>
                            </div>
                        </div>
                        
                        <button id="resetChecklist" class="mt-4 w-full bg-[#1f2a3e] hover:bg-[#2a374e] text-white py-2 rounded-xl transition"><i class="fas fa-sync-alt mr-2"></i>Resetar EPIs</button>
                        <button id="backFromChecklist" class="mt-4 text-blue-400 hover:text-blue-300 text-sm w-full">← Voltar ao Admin</button>
                    </div>
                </div>
            `;
            document.getElementById("dynamicPanel").innerHTML = html;
            
            const checkboxes = document.querySelectorAll(".check-epi");
            const statusDiv = document.getElementById("statusMessage");
            const selfieSection = document.getElementById("selfieSection");
            const selfieInput = document.getElementById("selfieInput");
            const openCameraBtn = document.getElementById("openCameraBtn");
            const selfiePreview = document.getElementById("selfiePreview");
            const selfieImg = document.getElementById("selfieImg");
            const confirmSelfieBtn = document.getElementById("confirmSelfieBtn");
            const removeSelfieBtn = document.getElementById("removeSelfieBtn");
            
            let allEpisConfirmed = false;
            
            function updateStatus() {
                const allChecked = Array.from(checkboxes).every(cb => cb.checked);
                allEpisConfirmed = allChecked && checkboxes.length > 0;
                
                if(allEpisConfirmed) {
                    statusDiv.innerHTML = '<i class="fas fa-check-circle mr-2"></i> CONFORME - Todos os EPIs utilizados!';
                    statusDiv.className = "mt-6 p-4 rounded-xl text-center font-bold text-lg bg-emerald-900/60 text-emerald-200 border border-emerald-500";
                    // Mostra o dropdown de selfie com animação
                    selfieSection.classList.remove("hidden");
                    selfieSection.classList.add("slide-enter");
                } else {
                    statusDiv.innerHTML = `<i class="fas fa-times-circle mr-2"></i> NÃO CONFORME - Marque todos os ${checkboxes.length} EPIs.`;
                    statusDiv.className = "mt-6 p-4 rounded-xl text-center font-bold text-lg bg-red-900/60 text-red-200 border border-red-500";
                    // Esconde seção de selfie se não estiver conforme
                    selfieSection.classList.add("hidden");
                    currentSelfieDataUrl = null;
                    selfiePreview.classList.add("hidden");
                    if(confirmSelfieBtn) confirmSelfieBtn.disabled = true;
                }
                updateConfirmButtonState();
            }
            
            function updateConfirmButtonState() {
                if(confirmSelfieBtn) {
                    const hasSelfie = currentSelfieDataUrl !== null;
                    confirmSelfieBtn.disabled = !(allEpisConfirmed && hasSelfie);
                }
            }
            
            // Capturar selfie via arquivo
            selfieInput?.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentSelfieDataUrl = event.target.result;
                        selfieImg.src = currentSelfieDataUrl;
                        selfiePreview.classList.remove("hidden");
                        updateConfirmButtonState();
                        showToast("Selfie carregada com sucesso!", "success");
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // Abrir câmera (capture em dispositivos móveis)
            openCameraBtn?.addEventListener("click", () => {
                // Cria input com capture para forçar câmera
                const cameraInput = document.createElement("input");
                cameraInput.type = "file";
                cameraInput.accept = "image/*";
                cameraInput.capture = "environment";
                cameraInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            currentSelfieDataUrl = ev.target.result;
                            selfieImg.src = currentSelfieDataUrl;
                            selfiePreview.classList.remove("hidden");
                            updateConfirmButtonState();
                            showToast("Selfie capturada pela câmera!", "success");
                        };
                        reader.readAsDataURL(file);
                    }
                };
                cameraInput.click();
            });
            
            // Remover selfie
            removeSelfieBtn?.addEventListener("click", () => {
                currentSelfieDataUrl = null;
                selfiePreview.classList.add("hidden");
                selfieInput.value = "";
                updateConfirmButtonState();
                showToast("Selfie removida", "info");
            });
            
            // Finalizar checklist com selfie
            confirmSelfieBtn?.addEventListener("click", () => {
                if(allEpisConfirmed && currentSelfieDataUrl) {
                    // Salvar no histórico
                    const record = {
                        machineId: machine.id,
                        machineName: machine.name,
                        timestamp: new Date().toISOString(),
                        selfie: currentSelfieDataUrl,
                        episUsed: machine.requiredEpis
                    };
                    checklistHistory.push(record);
                    saveData();
                    showToast("✅ Checklist finalizado com sucesso! Selfie comprobatória registrada.", "success");
                    // Opcional: voltar ao admin após 2 segundos
                    setTimeout(() => renderFullAdmin(), 2000);
                }
            });
            
            checkboxes.forEach(cb => cb.addEventListener("change", updateStatus));
            document.getElementById("resetChecklist")?.addEventListener("click", () => { 
                checkboxes.forEach(cb => cb.checked = false); 
                currentSelfieDataUrl = null;
                selfiePreview.classList.add("hidden");
                if(selfieInput) selfieInput.value = "";
                updateStatus();
                showToast("Checklist resetado", "info");
            });
            document.getElementById("backFromChecklist")?.addEventListener("click", () => renderFullAdmin());
            updateStatus();
        }
        
        function showQRSimulator() {
            if(!machines.length) {
                document.getElementById("dynamicPanel").innerHTML = `<div class="card-glass p-8 text-center"><i class="fas fa-exclamation-triangle text-yellow-400 text-4xl"></i><p class="text-white mt-2">Nenhuma máquina cadastrada</p><button id="goAdminBtn" class="mt-4 bg-blue-600 px-5 py-2 rounded-xl">Ir para Admin</button></div>`;
                document.getElementById("goAdminBtn")?.addEventListener("click", () => renderFullAdmin());
                return;
            }
            const selectHtml = `<select id="simulateSelect" class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white mb-4">${machines.map(m => `<option value="${m.id}">${m.name} (${m.id})</option>`).join('')}</select>`;
            const html = `<div class="max-w-md mx-auto card-glass rounded-2xl p-7"><i class="fas fa-qrcode text-5xl text-purple-400 mb-4 block text-center"></i><h2 class="text-2xl font-bold text-white text-center mb-4">Simular QR Code</h2>${selectHtml}<button id="simulateBtn" class="bg-emerald-600 w-full py-3 rounded-xl font-bold hover:bg-emerald-500 transition"><i class="fas fa-clipboard-check mr-2"></i>Acessar Checklist com Selfie</button><button id="backAdminSim" class="mt-4 text-gray-400 text-sm w-full">← Voltar</button></div>`;
            document.getElementById("dynamicPanel").innerHTML = html;
            document.getElementById("simulateBtn")?.addEventListener("click", () => renderChecklistModule(document.getElementById("simulateSelect").value));
            document.getElementById("backAdminSim")?.addEventListener("click", () => renderFullAdmin());
        }
        
        function handleRoute() {
            const params = new URLSearchParams(window.location.search);
            const machineId = params.get("checklist");
            if(machineId && machines.find(m => m.id === machineId)) {
                renderChecklistModule(machineId);
                return true;
            }
            return false;
        }
        
        function init() {
            initMobileMenu();
            if(!handleRoute()) renderFullAdmin();
            document.getElementById("navAdmin")?.addEventListener("click", () => { renderFullAdmin(); window.history.pushState({}, "", window.location.pathname); });
            document.getElementById("navMachines")?.addEventListener("click", () => { renderFullAdmin(); });
            document.getElementById("navEmployees")?.addEventListener("click", () => { renderFullAdmin(); });
            document.getElementById("navQRSImulator")?.addEventListener("click", () => { showQRSimulator(); });
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
        init();
    </script>
</body>
</html>
