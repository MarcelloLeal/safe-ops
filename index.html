<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SafeOps | Segurança Industrial SaaS</title>
    <!-- Tailwind CSS + Font Awesome + QR Code Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        body {
            background: #0a0f1a;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f2e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b4a6b;
            border-radius: 10px;
        }
        .slide-enter {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .toast-notification {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .card-glass {
            background: linear-gradient(135deg, rgba(30, 35, 48, 0.95) 0%, rgba(20, 25, 38, 0.98) 100%);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(59, 74, 107, 0.5);
        }
        .qr-container img {
            margin: 0 auto;
            width: 90px;
            height: auto;
            background: white;
            padding: 6px;
            border-radius: 12px;
        }
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 768px) {
            .sidebar-mobile {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }
            .sidebar-mobile.open {
                transform: translateX(0);
            }
        }
        .video-preview {
            transform: scaleX(-1);
        }
        .countdown-timer {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }
        .checkbox-group {
            max-height: 280px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .checkbox-group::-webkit-scrollbar {
            width: 4px;
        }
        #mobileOverlay {
            transition: opacity 0.3s ease;
        }
        #mobileOverlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        #mobileOverlay:not(.hidden) {
            opacity: 1;
            visibility: visible;
        }
        .login-modal {
            animation: fadeInScale 0.3s ease-out;
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="bg-[#0a0f1a] font-sans antialiased">

    <!-- Mobile Overlay -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 hidden md:hidden transition-all duration-300"></div>

    <div class="flex min-h-screen">
        <!-- MENU LATERAL SAAS -->
        <aside id="sidebar" class="sidebar-transition fixed md:relative w-72 h-full bg-[#0d1222] border-r border-[#1e2a3e] shadow-2xl flex flex-col z-50 sidebar-mobile">
            <div class="p-6 border-b border-[#1e2a3e]">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-red-600 to-red-800 p-2.5 rounded-xl shadow-lg">
                        <i class="fas fa-hard-hat text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white tracking-tight">SafeOps<span class="text-red-500">|</span></h1>
                        <p class="text-xs text-gray-400">Segurança Industrial SaaS</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 py-6 px-4 space-y-2" id="mainNav">
                <!-- Menu items serão injetados dinamicamente conforme perfil -->
            </nav>
            <div class="p-4 border-t border-[#1e2a3e] text-xs text-gray-500">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-shield-alt text-emerald-500"></i>
                        <span>ISO 45001:2023</span>
                    </div>
                    <button id="logoutBtn" class="text-red-400 hover:text-red-300 text-xs flex items-center gap-1">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
                <p class="text-[11px]" id="userInfoDisplay"></p>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="flex-1 min-h-screen">
            <div class="sticky top-0 z-30 bg-[#0d1222]/90 backdrop-blur-md border-b border-[#1e2a3e] px-4 py-3 flex items-center justify-between">
                <button id="menuToggle" class="md:hidden text-gray-300 hover:text-white text-2xl p-2 rounded-lg hover:bg-[#1a2035] transition">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-3 ml-auto">
                    <div class="hidden sm:flex items-center gap-2 bg-[#111827] px-3 py-1.5 rounded-full border border-[#1e2a3e]">
                        <i class="fas fa-circle text-emerald-500 text-xs"></i>
                        <span class="text-xs text-gray-300" id="statusBadge">Sistema operacional</span>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center shadow-lg">
                        <i class="fas fa-user-shield text-white text-sm"></i>
                    </div>
                </div>
            </div>
            <div id="dynamicPanel" class="p-5 md:p-7 lg:p-8 slide-enter">
                <div class="flex items-center justify-center py-20">
                    <i class="fas fa-spinner fa-pulse text-4xl text-indigo-400 mb-4"></i>
                    <p class="text-gray-400">Carregando SafeOps...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL DE LOGIN -->
    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 transition-all">
        <div class="login-modal card-glass rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="text-center mb-6">
                <div class="bg-gradient-to-br from-red-600 to-red-800 p-3 rounded-2xl inline-block mb-3">
                    <i class="fas fa-hard-hat text-white text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">SafeOps</h2>
                <p class="text-gray-400 text-sm mt-1">Sistema de Segurança Industrial</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-300 text-sm mb-2">Usuário</label>
                    <input type="text" id="loginUser" placeholder="Digite seu usuário" 
                        class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-gray-300 text-sm mb-2">Senha</label>
                    <input type="password" id="loginPass" placeholder="Digite sua senha" 
                        class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white placeholder-gray-500 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                
                <div class="bg-[#111827] rounded-xl p-3 border border-[#1f2a3e]">
                    <p class="text-xs text-gray-400 mb-2">🔐 Credenciais de demonstração:</p>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div class="text-emerald-400">👑 Admin:</div>
                        <div class="text-gray-300">admin / admin123</div>
                        <div class="text-cyan-400">👤 Colaborador:</div>
                        <div class="text-gray-300">colab / colab123</div>
                    </div>
                </div>
                
                <button id="loginBtn" class="bg-blue-600 hover:bg-blue-500 text-white w-full py-3 rounded-xl font-bold transition shadow-lg mt-2">
                    <i class="fas fa-sign-in-alt mr-2"></i> Entrar
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script>
        // ================================
        // 1. DADOS E CONFIGURAÇÕES GLOBAIS
        // ================================
        const RISKS_CATALOG = [
            "Atropelamento", "Choque elétrico", "Corte/Amputação", "Queda de altura", 
            "Ruído excessivo", "Exposição química", "Incêndio", "Explosão", "Fadiga térmica",
            "Esforço repetitivo", "Poeira industrial", "Vibração", "Ruído avariado"
        ];
        
        const EPIS_CATALOG = [
            "Capacete de segurança", "Óculos de proteção", "Protetor auricular", 
            "Luvas de borracha", "Cinto de segurança", "Máscara respiratória", 
            "Avental impermeável", "Calçado de segurança", "Jaleco", "Protetor facial",
            "Luvas térmicas", "Trava-quedas", "Cintas de contaminação"
        ];

        let machines = [
            { id: "MACH-001", name: "Prensa Hidráulica 3000", risks: ["Corte/Amputação", "Ruído excessivo"], requiredEpis: ["Luvas de borracha", "Protetor auricular", "Calçado de segurança"] },
            { id: "MACH-002", name: "Esteira Transportadora", risks: ["Atropelamento", "Choque elétrico"], requiredEpis: ["Capacete de segurança", "Calçado de segurança"] },
            { id: "MACH-003", name: "Painel Elétrico Industrial", risks: ["Choque elétrico", "Incêndio"], requiredEpis: ["Luvas de borracha", "Óculos de proteção", "Capacete de segurança"] }
        ];
        
        let employees = [
            { id: "FUNC-001", name: "Carlos Mendes", role: "Operador", shift: "Matutino", sector: "Produção" },
            { id: "FUNC-002", name: "Juliana Rocha", role: "Manutenção", shift: "Noturno", sector: "Manutenção" },
            { id: "FUNC-003", name: "Roberto Almeida", role: "Técnico", shift: "Vespertino", sector: "Qualidade" }
        ];

        let checklistHistory = [];

        // Sessão do usuário
        let currentUser = null;

        function saveData() {
            localStorage.setItem("safeops_machines", JSON.stringify(machines));
            localStorage.setItem("safeops_employees", JSON.stringify(employees));
            localStorage.setItem("safeops_checklist_history", JSON.stringify(checklistHistory));
        }
        
        function loadData() {
            const storedMachines = localStorage.getItem("safeops_machines");
            const storedEmployees = localStorage.getItem("safeops_employees");
            const storedHistory = localStorage.getItem("safeops_checklist_history");
            if(storedMachines) machines = JSON.parse(storedMachines);
            if(storedEmployees) employees = JSON.parse(storedEmployees);
            if(storedHistory) checklistHistory = JSON.parse(storedHistory);
        }
        loadData();
        
        function generateQRCodeUrl(machineId) {
            const baseUrl = window.location.origin + window.location.pathname;
            return `${baseUrl}?checklist=${encodeURIComponent(machineId)}`;
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-notification px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-medium backdrop-blur-sm border ${
                type === 'success' ? 'bg-emerald-900/90 border-emerald-500 text-emerald-200' : 
                type === 'error' ? 'bg-red-900/90 border-red-500 text-red-200' : 
                'bg-blue-900/90 border-blue-500 text-blue-200'
            }`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon} text-lg"></i><span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            if(window.innerWidth < 768) {
                sidebar.classList.remove('open');
                overlay.classList.add('hidden');
            }
        }
        
        function openMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            if(window.innerWidth < 768) {
                sidebar.classList.add('open');
                overlay.classList.remove('hidden');
            }
        }
        
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            
            if(menuToggle) {
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(sidebar.classList.contains('open')) {
                        closeMobileMenu();
                    } else {
                        openMobileMenu();
                    }
                });
            }
            if(overlay) {
                overlay.addEventListener('click', () => closeMobileMenu());
            }
            window.addEventListener('resize', () => {
                if(window.innerWidth >= 768) {
                    sidebar.classList.remove('open');
                    overlay.classList.add('hidden');
                }
            });
        }
        
        function navigateWithMenuClose(navigationFn) {
            return () => {
                navigationFn();
                closeMobileMenu();
            };
        }
        
        // ================================
        // 2. FUNÇÕES DE RENDERIZAÇÃO POR PERFIL
        // ================================
        
        function renderSidebarMenu() {
            const navContainer = document.getElementById('mainNav');
            const userInfoSpan = document.getElementById('userInfoDisplay');
            const statusBadge = document.getElementById('statusBadge');
            
            if(!currentUser) return;
            
            if(currentUser.role === 'admin') {
                navContainer.innerHTML = `
                    <button id="navDashboard" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-tachometer-alt w-5 text-indigo-400"></i>
                        <span class="font-medium">Dashboard</span>
                    </button>
                    <button id="navMachines" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-microchip w-5 text-blue-400"></i>
                        <span class="font-medium">Máquinas & EPIs</span>
                    </button>
                    <button id="navEmployees" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-users w-5 text-emerald-400"></i>
                        <span class="font-medium">Colaboradores</span>
                    </button>
                    <div class="h-px bg-[#1e2a3e] my-3"></div>
                    <button id="navChecklist" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-clipboard-list w-5 text-cyan-400"></i>
                        <span class="font-medium">Checklist + Selfie</span>
                    </button>
                    <button id="navHistory" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-history w-5 text-purple-400"></i>
                        <span class="font-medium">Histórico de Inspeções</span>
                    </button>
                `;
                userInfoSpan.innerHTML = `<i class="fas fa-crown text-yellow-500 mr-1"></i> Admin: ${currentUser.name}`;
                statusBadge.innerHTML = '<i class="fas fa-crown text-yellow-500 mr-1"></i> Modo Admin';
            } else {
                navContainer.innerHTML = `
                    <button id="navChecklistColab" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-clipboard-list w-5 text-cyan-400"></i>
                        <span class="font-medium">Checklist de Segurança</span>
                    </button>
                    <button id="navHistoryColab" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-[#1a2035] hover:text-white transition-all group">
                        <i class="fas fa-history w-5 text-purple-400"></i>
                        <span class="font-medium">Minhas Inspeções</span>
                    </button>
                `;
                userInfoSpan.innerHTML = `<i class="fas fa-user text-blue-400 mr-1"></i> Colaborador: ${currentUser.name}`;
                statusBadge.innerHTML = '<i class="fas fa-user text-blue-400 mr-1"></i> Modo Colaborador';
            }
            
            // Atribuir eventos
            if(currentUser.role === 'admin') {
                document.getElementById("navDashboard")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderDashboard(); }));
                document.getElementById("navMachines")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderMachinesModule(); }));
                document.getElementById("navEmployees")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderEmployeesModule(); }));
                document.getElementById("navChecklist")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderChecklistModule(); }));
                document.getElementById("navHistory")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderHistoryModule(); }));
            } else {
                document.getElementById("navChecklistColab")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderChecklistModule(); }));
                document.getElementById("navHistoryColab")?.addEventListener("click", navigateWithMenuClose(() => { stopCamera(); renderHistoryModuleColab(); }));
            }
        }
        
        // ================================
        // 3. DASHBOARD (APENAS ADMIN)
        // ================================
        function renderDashboard() {
            if(currentUser?.role !== 'admin') {
                renderChecklistModule();
                return;
            }
            
            const totalMachines = machines.length;
            const totalEmployees = employees.length;
            const totalInspections = checklistHistory.length;
            const recentInspections = [...checklistHistory].reverse().slice(0, 5);
            
            const html = `
                <div class="space-y-6">
                    <div>
                        <h1 class="text-2xl font-bold text-white">Dashboard</h1>
                        <p class="text-gray-400">Visão geral da segurança operacional</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="card-glass rounded-2xl p-5">
                            <div class="flex items-center justify-between">
                                <div><i class="fas fa-microchip text-3xl text-blue-400"></i></div>
                                <span class="text-3xl font-bold text-white">${totalMachines}</span>
                            </div>
                            <p class="text-gray-400 mt-2">Máquinas cadastradas</p>
                        </div>
                        <div class="card-glass rounded-2xl p-5">
                            <div class="flex items-center justify-between">
                                <div><i class="fas fa-users text-3xl text-emerald-400"></i></div>
                                <span class="text-3xl font-bold text-white">${totalEmployees}</span>
                            </div>
                            <p class="text-gray-400 mt-2">Colaboradores ativos</p>
                        </div>
                        <div class="card-glass rounded-2xl p-5">
                            <div class="flex items-center justify-between">
                                <div><i class="fas fa-clipboard-list text-3xl text-purple-400"></i></div>
                                <span class="text-3xl font-bold text-white">${totalInspections}</span>
                            </div>
                            <p class="text-gray-400 mt-2">Inspeções realizadas</p>
                        </div>
                    </div>
                    <div class="card-glass rounded-2xl p-5">
                        <h3 class="font-bold text-white mb-3"><i class="fas fa-history mr-2"></i>Últimas Inspeções</h3>
                        ${recentInspections.length === 0 ? '<p class="text-gray-400 text-center py-4">Nenhuma inspeção registrada ainda</p>' : 
                            recentInspections.map(ins => `
                                <div class="border-b border-[#1e2a3e] py-2 flex justify-between items-center">
                                    <div>
                                        <p class="text-white text-sm">${ins.machineName}</p>
                                        <p class="text-gray-500 text-xs">${new Date(ins.timestamp).toLocaleString('pt-BR')}</p>
                                    </div>
                                    <i class="fas fa-check-circle text-emerald-500"></i>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `;
            document.getElementById("dynamicPanel").innerHTML = html;
        }
        
        // ================================
        // MÓDULOS ADMIN
        // ================================
        function renderMachinesModule() {
            if(currentUser?.role !== 'admin') {
                showToast("Acesso negado. Apenas administradores.", "error");
                renderChecklistModule();
                return;
            }
            
            const risksCheckboxes = RISKS_CATALOG.map(risk => `
                <label class="flex items-center gap-2 p-2 rounded-lg hover:bg-[#1a2035] cursor-pointer transition">
                    <input type="checkbox" value="${risk}" class="risk-checkbox w-4 h-4 rounded border-gray-500 text-blue-500 focus:ring-blue-500">
                    <span class="text-gray-300 text-sm">${risk}</span>
                </label>
            `).join('');
            
            const episCheckboxes = EPIS_CATALOG.map(epi => `
                <label class="flex items-center gap-2 p-2 rounded-lg hover:bg-[#1a2035] cursor-pointer transition">
                    <input type="checkbox" value="${epi}" class="epi-checkbox w-4 h-4 rounded border-gray-500 text-emerald-500 focus:ring-emerald-500">
                    <span class="text-gray-300 text-sm">${epi}</span>
                </label>
            `).join('');
            
            const html = `
                <div class="space-y-6">
                    <div class="flex items-center gap-3 border-b border-[#1e2a3e] pb-3">
                        <div class="bg-blue-600/20 p-2 rounded-xl"><i class="fas fa-microchip text-blue-400 text-xl"></i></div>
                        <h2 class="text-xl font-bold text-white">Máquinas & EPIs</h2>
                    </div>
                    <div class="card-glass rounded-2xl p-6">
                        <h3 class="font-bold text-gray-200 flex items-center gap-2 mb-5"><i class="fas fa-plus-circle text-emerald-400"></i> Nova Máquina</h3>
                        <div class="space-y-5">
                            <input type="text" id="machineName" placeholder="Nome da máquina" class="w-full p-3 bg-[#111827] border border-[#1f2a3e] rounded-xl text-white">
                            <div>
                                <label class="block text-gray-300 font-medium mb-2">Riscos</label>
                                <div class="bg-[#111827] border border-[#1f2a3e] rounded-xl p-3">
                                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-1 checkbox-group" style="max-height: 240px; overflow-y: auto;">${risksCheckboxes}</div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-gray-300 font-medium mb-2">EPIs obrigatórios</label>
                                <div class="bg-[#111827] border border-[#1f2a3e] rounded-xl p-3">
                                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-1 checkbox-group" style="max-height: 240px; overflow-y: auto;">${episCheckboxes}</div>
                                </div>
                            </div>
                            <button id="addMachineBtn" class="bg-blue-600 hover:bg-blue-500 text-white w-full py-3 rounded-xl font-bold"><i class="fas fa-save mr-2"></i> Registrar</button>
                        </div>
                    </div>
                    <div id="machineListContainer" class="space-y-3">
                        ${machines.map(m => `<div class="card-glass rounded-xl p-4 flex justify-between items-start"><div><span class="font-bold text-white">${m.name}</span><div class="text-xs text-gray-400 mt-1">EPIs: ${m.requiredEpis.join(', ')}</div></div><div id="qr-${m.id}" class="qr-container"></div></div>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById("dynamicPanel").innerHTML = html;
            
            machines.forEach(m => {
                const container = document.getElementById(`qr-${m.id}`);
                if(container && !container.hasChildNodes()) {
                    new QRCode(container, { text: generateQRCodeUrl(m.id), width: 70, height: 70, colorDark: "#1e1e2f", colorLight: "#ffffff" });
                }
            });
            
            document.getElementById("addMachineBtn")?.addEventListener("click", () => {
                const name = document.getElementById("machineName").value.trim();
                const risks = Array.from(document.querySelectorAll(".risk-checkbox:checked")).map(cb => cb.value);
                const epis = Array.from(document.querySelectorAll(".epi-checkbox:checked")).map(cb => cb.value);
                if(!name || !risks.length || !epis.length) return showToast("Preencha todos os campos", "error");
                machines.push({ id: `MACH-${String(machines.length+1).padStart(3,'0')}`, name, risks, requiredEpis: epis });
                saveData();
                renderMachinesModule();
                showToast("Máquina cadastrada!", "success");
            });
        }
        
        function renderEmployeesModule() {
            if(currentUser?.role !== 'admin') {
                showToast("Acesso negado.", "error");
                renderChecklistModule();
                return;
            }
            const html = `
                <div class="space-y-6">
                    <div class="flex items-center gap-3 border-b border-[#1e2a3e] pb-3">
                        <div class="bg-emerald-600/20 p-2 rounded-xl"><i class="fas fa-users text-emerald-400 text-xl"></i></div>
                        <h2 class="text-xl font-bold text-white">Colaboradores</h2>
                    </div>
                    <div class="card-glass rounded-2xl p-6">
                        <input type="text" id="empName" placeholder="Nome" class="w-full p-3 bg-[#111827] border rounded-xl text-white mb-3">
                        <input type="text" id="empRole" placeholder="Cargo" class="w-full p-3 bg-[#111827] border rounded-xl text-white mb-3">
                        <button id="addEmployeeBtn" class="bg-emerald-600 w-full py-3 rounded-xl font-bold">Cadastrar</button>
                    </div>
                    ${employees.map(emp => `<div class="bg-[#111827] rounded-xl p-3 flex justify-between"><span class="text-white">${emp.name} - ${emp.role}</span><button class="deleteEmployeeBtn text-red-400" data-id="${emp.id}">❌</button></div>`).join('')}
                </div>
            `;
            document.getElementById("dynamicPanel").innerHTML = html;
            document.getElementById("addEmployeeBtn")?.addEventListener("click", () => {
                const name = document.getElementById("empName").value.trim();
                const role = document.getElementById("empRole").value.trim();
                if(!name || !role) return showToast("Preencha os campos", "error");
                employees.push({ id: `FUNC-${String(employees.length+100).slice(-3)}`, name, role, shift: "Matutino", sector: "Operações" });
                saveData();
                renderEmployeesModule();
                showToast("Funcionário cadastrado!", "success");
            });
            document.querySelectorAll(".deleteEmployeeBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    employees = employees.filter(e => e.id !== btn.dataset.id);
                    saveData();
                    renderEmployeesModule();
                });
            });
        }
        
        // ================================
        // 4. CHECKLIST COM CÂMERA (ACESSO PARA AMBOS)
        // ================================
        let currentStream = null;
        let currentFacingMode = "environment";
        let countdownInterval = null;
        
        async function initCamera(previewElement, facingMode) {
            if(currentStream) currentStream.getTracks().forEach(track => track.stop());
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
                previewElement.srcObject = stream;
                currentStream = stream;
                return true;
            } catch { return false; }
        }
        
        function stopCamera() {
            if(currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
        }
        
        function renderChecklistModule() {
            if(machines.length === 0) {
                document.getElementById("dynamicPanel").innerHTML = `<div class="card-glass p-8 text-center"><p class="text-white">Nenhuma máquina cadastrada. Aguarde o administrador.</p></div>`;
                return;
            }
            
            const machineSelect = `<select id="checklistMachineSelect" class="w-full p-3 bg-[#111827] border rounded-xl text-white mb-4">${machines.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}</select>`;
            const html = `
                <div class="max-w-4xl mx-auto space-y-6">
                    <div class="card-glass rounded-2xl p-6">
                        <h2 class="text-xl font-bold text-white mb-4">Checklist de Segurança</h2>
                        ${machineSelect}
                        <div id="epiCheckArea"></div>
                        <div id="statusMessage" class="mt-4 p-3 rounded-xl text-center"></div>
                    </div>
                    <div id="cameraSection" class="card-glass rounded-2xl p-6 hidden">
                        <div class="relative bg-black rounded-xl overflow-hidden aspect-video">
                            <video id="videoPreview" class="w-full h-full object-cover video-preview" autoplay playsinline muted></video>
                            <div id="countdownOverlay" class="absolute inset-0 flex items-center justify-center bg-black/70 hidden"><span id="countdownNumber" class="text-8xl font-bold text-white">3</span></div>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <button id="switchCameraBtn" class="flex-1 bg-purple-600/30 text-purple-300 py-2 rounded-xl"><i class="fas fa-sync-alt mr-2"></i> Alternar</button>
                            <button id="takePhotoBtn" class="flex-1 bg-emerald-600 text-white py-2 rounded-xl"><i class="fas fa-camera mr-2"></i> Selfie (3s)</button>
                            <button id="uploadFallbackBtn" class="flex-1 bg-gray-600 text-white py-2 rounded-xl"><i class="fas fa-upload"></i></button>
                        </div>
                        <div id="selfiePreviewArea" class="mt-4 hidden"><img id="capturedSelfie" class="w-full rounded-xl border-2 border-emerald-500"><button id="removeSelfieBtnCam" class="mt-2 w-full bg-red-600 py-1 rounded">Remover</button></div>
                        <button id="finalizeChecklistBtn" class="mt-4 w-full bg-emerald-600 py-3 rounded-xl font-bold disabled:opacity-50" disabled>Finalizar Checklist</button>
                    </div>
                </div>
            `;
            document.getElementById("dynamicPanel").innerHTML = html;
            
            let currentMachine = null, allEpisChecked = false, capturedSelfieData = null;
            const videoPreview = document.getElementById("videoPreview");
            
            function loadEpis() {
                currentMachine = machines.find(m => m.id === document.getElementById("checklistMachineSelect").value);
                if(!currentMachine) return;
                document.getElementById("epiCheckArea").innerHTML = `<div class="space-y-2">${currentMachine.requiredEpis.map(epi => `<label class="flex items-center gap-3 p-3 bg-[#111827] rounded-xl cursor-pointer"><input type="checkbox" data-epi="${epi}" class="check-epi w-5 h-5"><span class="text-gray-200">${epi}</span></label>`).join('')}</div>`;
                const checkboxes = document.querySelectorAll(".check-epi");
                const update = () => {
                    allEpisChecked = Array.from(checkboxes).every(cb => cb.checked);
                    const statusDiv = document.getElementById("statusMessage");
                    if(allEpisChecked) {
                        statusDiv.innerHTML = '✅ CONFORME - Todos os EPIs marcados!';
                        statusDiv.className = "mt-4 p-3 rounded-xl text-center font-bold bg-emerald-900/60 text-emerald-200";
                        document.getElementById("cameraSection").classList.remove("hidden");
                    } else {
                        statusDiv.innerHTML = '❌ NÃO CONFORME - Marque todos os EPIs.';
                        statusDiv.className = "mt-4 p-3 rounded-xl text-center font-bold bg-red-900/60 text-red-200";
                        document.getElementById("cameraSection").classList.add("hidden");
                        document.getElementById("finalizeChecklistBtn").disabled = true;
                    }
                };
                checkboxes.forEach(cb => cb.addEventListener("change", update));
                update();
            }
            
            document.getElementById("checklistMachineSelect")?.addEventListener("change", loadEpis);
            loadEpis();
            
            async function startCamera() { await initCamera(videoPreview, currentFacingMode); }
            document.getElementById("switchCameraBtn")?.addEventListener("click", async () => { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; await startCamera(); });
            
            function startCountdown() {
                let count = 3;
                const overlay = document.getElementById("countdownOverlay");
                const span = document.getElementById("countdownNumber");
                overlay.classList.remove("hidden");
                span.textContent = count;
                if(countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    count--;
                    if(count >= 0) span.textContent = count;
                    if(count < 0) { clearInterval(countdownInterval); overlay.classList.add("hidden"); capturePhoto(); }
                }, 1000);
            }
            
            function capturePhoto() {
                const canvas = document.createElement("canvas");
                canvas.width = videoPreview.videoWidth;
                canvas.height = videoPreview.videoHeight;
                canvas.getContext("2d").drawImage(videoPreview, 0, 0);
                capturedSelfieData = canvas.toDataURL("image/jpeg", 0.9);
                document.getElementById("capturedSelfie").src = capturedSelfieData;
                document.getElementById("selfiePreviewArea").classList.remove("hidden");
                document.getElementById("finalizeChecklistBtn").disabled = false;
                showToast("Selfie capturada!", "success");
            }
            
            document.getElementById("takePhotoBtn")?.addEventListener("click", () => { if(allEpisChecked) startCountdown(); else showToast("Marque todos os EPIs", "error"); });
            document.getElementById("uploadFallbackBtn")?.addEventListener("click", () => {
                if(!allEpisChecked) return showToast("Marque os EPIs primeiro", "error");
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "image/*";
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if(file) { const reader = new FileReader(); reader.onload = (ev) => { capturedSelfieData = ev.target.result; document.getElementById("capturedSelfie").src = capturedSelfieData; document.getElementById("selfiePreviewArea").classList.remove("hidden"); document.getElementById("finalizeChecklistBtn").disabled = false; }; reader.readAsDataURL(file); }
                };
                input.click();
            });
            document.getElementById("removeSelfieBtnCam")?.addEventListener("click", () => { capturedSelfieData = null; document.getElementById("selfiePreviewArea").classList.add("hidden"); document.getElementById("finalizeChecklistBtn").disabled = true; });
            document.getElementById("finalizeChecklistBtn")?.addEventListener("click", () => {
                if(allEpisChecked && capturedSelfieData && currentMachine) {
                    checklistHistory.push({ machineId: currentMachine.id, machineName: currentMachine.name, timestamp: new Date().toISOString(), selfie: capturedSelfieData, episUsed: currentMachine.requiredEpis, userName: currentUser?.name });
                    saveData();
                    showToast("Checklist finalizado!", "success");
                    stopCamera();
                    setTimeout(() => renderChecklistModule(), 1500);
                }
            });
            startCamera();
        }
        
        function renderHistoryModule() {
            const userHistory = currentUser?.role === 'admin' ? checklistHistory : checklistHistory.filter(h => h.userName === currentUser?.name);
            const html = `<div class="card-glass rounded-2xl p-6"><h2 class="text-xl font-bold text-white mb-4">${currentUser?.role === 'admin' ? 'Todas as Inspeções' : 'Minhas Inspeções'}</h2>${userHistory.length === 0 ? '<p class="text-gray-400">Nenhuma inspeção encontrada</p>' : [...userHistory].reverse().map(item => `<div class="border-b border-[#1e2a3e] py-3"><p class="text-white">${item.machineName}</p><p class="text-gray-400 text-xs">${new Date(item.timestamp).toLocaleString()}</p><img src="${item.selfie}" class="w-16 h-16 rounded mt-2"></div>`).join('')}</div>`;
            document.getElementById("dynamicPanel").innerHTML = html;
        }
        
        function renderHistoryModuleColab() { renderHistoryModule(); }
        
        // ================================
        // 5. LOGIN E AUTENTICAÇÃO
        // ================================
        const users = {
            admin: { username: "admin", password: "admin123", name: "Administrador", role: "admin" },
            colaborador: { username: "colab", password: "colab123", name: "Colaborador", role: "colaborador" }
        };
        
        function performLogin(username, password) {
            if(username === users.admin.username && password === users.admin.password) {
                currentUser = { ...users.admin };
                return true;
            } else if(username === users.colaborador.username && password === users.colaborador.password) {
                currentUser = { ...users.colaborador };
                return true;
            }
            return false;
        }
        
        function logout() {
            currentUser = null;
            stopCamera();
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('open');
            // Limpar campos de login
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }
        
        function afterLogin() {
            document.getElementById('loginModal').classList.add('hidden');
            renderSidebarMenu();
            
            // Redirecionar conforme perfil
            if(currentUser.role === 'admin') {
                renderDashboard();
                showToast(`Bem-vindo, ${currentUser.name}! Você está no Dashboard.`, "success");
            } else {
                renderChecklistModule();
                showToast(`Bem-vindo, ${currentUser.name}! Acesse o Checklist de Segurança.`, "success");
            }
        }
        
        function initAuth() {
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const loginUser = document.getElementById('loginUser');
            const loginPass = document.getElementById('loginPass');
            
            loginBtn.addEventListener('click', () => {
                const user = loginUser.value.trim();
                const pass = loginPass.value.trim();
                if(performLogin(user, pass)) {
                    afterLogin();
                } else {
                    showToast("Usuário ou senha inválidos!", "error");
                }
            });
            
            loginUser.addEventListener('keypress', (e) => { if(e.key === 'Enter') loginBtn.click(); });
            loginPass.addEventListener('keypress', (e) => { if(e.key === 'Enter') loginBtn.click(); });
            
            logoutBtn.addEventListener('click', () => { logout(); });
        }
        
        function init() {
            initMobileMenu();
            initAuth();
        }
        
        init();
    </script>
</body>
</html>
